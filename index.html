<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #111111; 
            color: #ffffff;
            overflow: hidden; /* Mencegah double scrollbar di browser PC */
            width: 100vw;
            height: 100vh;
        }

        /* OVERLAY COVER - Tampilan Awal Fullscreen */
        .cover-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('BG.jpg') no-repeat center center;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            text-align: center;
            transition: transform 1s cubic-bezier(0.77, 0, 0.175, 1), opacity 1s ease;
        }

        .cover-wrapper.fade-out {
            opacity: 0;
            transform: translateY(-100%);
            pointer-events: none;
        }

        .cover-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            width: 100%;
            padding: 20px;
        }

        .cover-icon-img {
            width: 200px;
            height: auto;
            margin-bottom: 25px;
            filter: drop-shadow(0px 8px 16px rgba(0,0,0,0.6));
            transition: transform 0.2s ease;
        }

        .pencetan-masuk {
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.8);
            border: 2px solid #ffffff;
            padding: 10px 30px;
            border-radius: 30px;
            background: rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        /* SCROLL SNAP CONTAINER (Membatasi tampilan mobile di tengah) */
        .snap-container {
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            height: 100vh;
            width: 100%;
            max-width: 450px; 
            margin: 0 auto;
            background-color: #000000;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            display: none; 
            position: relative;

            /* TRICK UTAMA: Menyembunyikan scrollbar di Chrome, Safari, dan Opera */
            -webkit-overflow-scrolling: touch; /* Biar scroll di iOS/HP sangat mulus */
        }

        /* Menyembunyikan scrollbar untuk Chrome, Safari, dan Opera */
        .snap-container::-webkit-scrollbar {
            display: none;
            width: 0 !important;
            height: 0 !important;
        }

        /* Menyembunyikan scrollbar untuk Firefox & IE/Edge */
        .snap-container {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        /* SETIAP SECTION/SLIDE */
        .slide-section {
            scroll-snap-align: start;
            height: 100vh;
            width: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            overflow: hidden; /* Mengunci elemen agar tidak bocor keluar slide */
        }

        /* Video MP4 Full-width */
        .slide-video {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            display: block;
        }

        /* FORM BUKU TAMU */
        .guestbook-overlay {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .guestbook-title {
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 15px;
            letter-spacing: 2px;
            color: #d4af37; 
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            outline: none;
        }

        .form-group input::placeholder, .form-group textarea::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .btn-submit {
            width: 100%;
            padding: 10px;
            background: #d4af37;
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            transition: background 0.3s ease;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        /* FLOATING MUSIC BUTTON */
        .music-control-btn {
            position: fixed;
            bottom: 25px;
            right: calc(50% - 200px); /* Memosisikan tombol agar tetap menempel di dekat frame hp (untuk PC) */
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background-color: #d4af37;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        /* Responsif untuk tampilan layar HP asli */
        @media (max-width: 450px) {
            .music-control-btn {
                right: 25px;
            }
        }

        .music-icon {
            font-size: 1.1rem;
            color: #000;
        }

        .music-control-btn.playing {
            animation: rotateMusic 4s linear infinite;
        }

        @keyframes rotateMusic {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
