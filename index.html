<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Undangan Pernikahan</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #111111; /* Tema gelap estetik */
            color: #ffffff;
            overflow-x: hidden;
            width: 100%;
        }

        /* OVERLAY COVER - Tampilan Awal Fullscreen */
        .cover-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('BG.jpg') no-repeat center center;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            text-align: center;
            transition: transform 1s cubic-bezier(0.77, 0, 0.175, 1), opacity 1s ease;
        }

        .cover-wrapper.fade-out {
            opacity: 0;
            transform: translateY(-100%);
            pointer-events: none;
        }

        .cover-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            width: 100%;
            padding: 20px;
        }

        .cover-icon-img {
            width: 200px;
            height: auto;
            margin-bottom: 25px;
            filter: drop-shadow(0px 8px 16px rgba(0,0,0,0.6));
            transition: transform 0.2s ease;
        }

        .cover-content:active .cover-icon-img {
            transform: scale(0.92);
        }

        .pencetan-masuk {
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.8);
            border: 2px solid #ffffff;
            padding: 10px 30px;
            border-radius: 30px;
            background: rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        /* SCROLL SNAP CONTAINER */
        .snap-container {
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            height: 100vh;
            width: 100%;
            max-width: 450px; /* Lebar HP standard agar rapi di PC */
            margin: 0 auto;
            background-color: #000000;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            display: none; /* Disembunyikan sebelum klik Masuk */
        }

        /* SETIAP SECTION/SLIDE */
        .slide-section {
            scroll-snap-align: start;
            min-height: 100vh;
            width: 100%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        /* Video MP4 Full-width */
        .slide-video {
            width: 100%;
            height: 100vh;
            object-fit: cover; /* Video mengisi penuh area layar */
            display: block;
        }

        /* FORM BUKU TAMU - ditaruh menumpuk di atas slide 5 */
        .guestbook-overlay {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .guestbook-title {
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 15px;
            letter-spacing: 2px;
            color: #d4af37; /* Aksen Gold */
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            outline: none;
        }

        .form-group input::placeholder, .form-group textarea::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .btn-submit {
            width: 100%;
            padding: 10px;
            background: #d4af37;
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            transition: background 0.3s ease;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        /* FLOATING MUSIC BUTTON */
        .music-control-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background-color: #d4af37;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .music-icon {
            font-size: 1.1rem;
            color: #000;
        }

        .music-control-btn.playing {
            animation: rotateMusic 4s linear infinite;
        }

        @keyframes rotateMusic {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- OVERLAY COVER -->
    <div id="cover" class="cover-wrapper">
        <div id="btn-buka" class="cover-content">
            <img src="icon.png" alt="Wedding Icon" class="cover-icon-img">
            <button class="pencetan-masuk">Buka Undangan</button>
        </div>
    </div>

    <!-- MAIN CONTAINER (SCROLL SNAP) -->
    <div id="main-container" class="snap-container">
        
        <!-- Slide 1 -->
        <section class="slide-section">
            <video class="slide-video" autoplay loop muted playsinline>
                <source src="1.mp4" type="video/mp4">
            </video>
        </section>

        <!-- Slide 2 -->
        <section class="slide-section">
            <video class="slide-video" autoplay loop muted playsinline>
                <source src="2.mp4" type="video/mp4">
            </video>
        </section>

        <!-- Slide 3 -->
        <section class="slide-section">
            <video class="slide-video" autoplay loop muted playsinline>
                <source src="3.mp4" type="video/mp4">
            </video>
        </section>

        <!-- Slide 4 -->
        <section class="slide-section">
            <video class="slide-video" autoplay loop muted playsinline>
                <source src="4.mp4" type="video/mp4">
            </video>
        </section>

        <!-- Slide 5 (Dilengkapi Form Buku Tamu di Atasnya) -->
        <section class="slide-section">
            <video class="slide-video" autoplay loop muted playsinline>
                <source src="5.mp4" type="video/mp4">
            </video>
            
            <!-- Elemen Buku Tamu Overlapping di Slide Terakhir -->
            <div class="guestbook-overlay">
                <p class="guestbook-title">BUKU TAMU & RSVP</p>
                <form id="rsvp-form">
                    <div class="form-group">
                        <input type="text" name="Nama" placeholder="Nama Lengkap Anda" required>
                    </div>
                    <div class="form-group">
                        <select name="Kehadiran" required>
                            <option value="" disabled selected>Konfirmasi Kehadiran</option>
                            <option value="Hadir">Hadir</option>
                            <option value="Tidak Hadir">Tidak Hadir</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <textarea name="Ucapan" rows="3" placeholder="Tulis ucapan hangat Anda..." required></textarea>
                    </div>
                    <button type="submit" class="btn-submit" id="submit-btn">Kirim Ucapan</button>
                </form>
            </div>
        </section>

    </div>

    <!-- FLOATING MUSIC BUTTON -->
    <button id="music-control" class="music-control-btn">
        <span class="music-icon">🎵</span>
    </button>

    <!-- AUDIO BACKSONG -->
    <audio id="myAudio" loop preload="auto">
        <source src="musik.mp3" type="video/mpeg">
    </audio>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const cover = document.getElementById('cover');
            const btnBuka = document.getElementById('btn-buka');
            const mainContainer = document.getElementById('main-container');
            const myAudio = document.getElementById('myAudio');
            const musicControl = document.getElementById('music-control');
            const rsvpForm = document.getElementById('rsvp-form');
            const submitBtn = document.getElementById('submit-btn');

            // --- 1. Logika Klik Masuk / Buka Undangan ---
            btnBuka.addEventListener('click', function() {
                // Play audio secara instan
                myAudio.play().then(() => {
                    musicControl.classList.add('playing');
                }).catch((err) => {
                    console.log("Autoplay audio diblokir, memicu klik tambahan...", err);
                    setTimeout(() => { myAudio.play(); }, 100);
                });

                // Transisi membuang Cover dan menampilkan Scroll Container
                cover.classList.add('fade-out');
                mainContainer.style.display = 'block';
                musicControl.style.display = 'flex';
                
                // Triger video di slide pertama agar pasti autoplay saat dibuka
                const firstVideo = mainContainer.querySelector('video');
                if (firstVideo) firstVideo.play();
            });

            // --- 2. Kontrol Musik Manual ---
            musicControl.addEventListener('click', function() {
                if (myAudio.paused) {
                    myAudio.play();
                    musicControl.classList.add('playing');
                } else {
                    myAudio.pause();
                    musicControl.classList.remove('playing');
                }
            });

            // --- 3. Pengiriman Buku Tamu (Google Sheets) ---
            // GANTI URL DI BAWAH INI dengan URL Web App dari Google Apps Script milik lu nanti!
            const scriptURL = 'MASUKKAN_URL_WEB_APP_GOOGLE_SCRIPTS_LU_DI_SINI';

            rsvpForm.addEventListener('submit', e => {
                e.preventDefault();
                submitBtn.disabled = true;
                submitBtn.innerText = 'Mengirim...';

                if(scriptURL === 'MASUKKAN_URL_WEB_APP_GOOGLE_SCRIPTS_LU_DI_SINI') {
                    alert('Koneksi Google Sheets belum dikonfigurasi! Harap ganti URL Script di baris kode HTML.');
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Kirim Ucapan';
                    return;
                }

                fetch(scriptURL, { method: 'POST', body: new FormData(rsvpForm)})
                    .then(response => {
                        alert('Terima kasih! Ucapan & RSVP Anda telah tersimpan.');
                        rsvpForm.reset();
                        submitBtn.disabled = false;
                        submitBtn.innerText = 'Kirim Ucapan';
                    })
                    .catch(error => {
                        console.error('Error!', error.message);
                        alert('Gagal mengirim ucapan, silakan coba lagi.');
                        submitBtn.disabled = false;
                        submitBtn.innerText = 'Kirim Ucapan';
                    });
            });
        });
    </script>
</body>
</html>
